  --red2:#fef2f2;
  --red3:#fecaca;
  --purple:#7c3aed;
  --purple2:#f5f3ff;
  --amber:#d97706;
  --amber2:#fffbeb;
  --gold:#b5893a;
  --gold2:#fdf6e3;
  --bg:#eef2f8;
  --surface:#ffffff;
  --border:#e2e8f0;

body{
  background:var(--bg);
  font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:16px;

.app{

  max-width:560px;
  background:var(--surface);
  border-radius:20px;

  display:flex;
  flex-direction:column;

}
.hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,var(--navy3) 100%);
  padding:14px 18px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.hdr::before{
  content:'';
  position:absolute;
  top:-30px;right:-20px;
  width:120px;height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  pointer-events:none;
}
.hdr::after{
  content:'';
  position:absolute;
  bottom:-40px;right:60px;
  width:80px;height:80px;
  border-radius:50%;
  background:rgba(255,255,255,0.03);
  pointer-events:none;
}
.content{flex:1;overflow-y:auto}
.nav{
  display:flex;
  border-top:1px solid var(--border);
  flex-shrink:0;
  background:white;
  padding:4px 6px;
  gap:2px;
}
.nb{
  flex:1;

  background:transparent;

.nb:hover:not(.on){background:#f8fafc;color:var(--text2)}

/* ── 데스크탑 2단 레이아웃 ── */

/* ── 상수 ── */
// 날짜 정규화: 어떤 형식이든 yyyy.mm.dd 로 통일
function normalizeDate(s){
  if(!s)return'';
  s=String(s).trim(); // 공백 제거
  // 이미 yyyy.mm.dd 형식
  if(/^\d{4}\.\d{2}\.\d{2}$/.test(s))return s;
  // yyyy-mm-dd 형식
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s.replace(/-/g,'.');
  // yyyy/mm/dd 형식
  if(/^\d{4}\/\d{2}\/\d{2}$/.test(s))return s.replace(/\//g,'.');
  // yyyy.m.d 또는 yyyy.mm.d 또는 yyyy.m.dd 형식
  if(/^\d{4}\.\d{1,2}\.\d{1,2}$/.test(s)){
    const p=s.split('.');
    return p[0]+'.'+p[1].padStart(2,'0')+'.'+p[2].padStart(2,'0');
  }
  // yyyy년 mm월 dd일 형식
  const kor=s.match(/^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일?$/);
  if(kor)return kor[1]+'.'+kor[2].padStart(2,'0')+'.'+kor[3].padStart(2,'0');
  return s;
}
const SS={풀이:{bg:'#dbeafe',text:'#1d4ed8',bar:'#3b82f6'},채점:{bg:'#fef9c3',text:'#92400e',bar:'#f59e0b'},오답:{bg:'#dcfce7',text:'#15803d',bar:'#22c55e'},아하노트:{bg:'#f3e8ff',text:'#7c3aed',bar:'#a855f7'},없음:{bg:'#f1f5f9',text:'#94a3b8',bar:'#e2e8f0'}};
const PS={100:{bg:'#dcfce7',text:'#15803d'},60:{bg:'#fef9c3',text:'#92400e'},30:{bg:'#dbeafe',text:'#1d4ed8'},0:{bg:'#f1f5f9',text:'#94a3b8'}};

    {name:'문제해결역량',score:'',grade:'',desc:'수학 개념을 문제 상황에 적절히 활용'},

  ];
  if(!Array.isArray(s.strong))s.strong=[{num:'',topic:'',sub:''},{num:'',topic:'',sub:''},{num:'',topic:'',sub:''}];
  if(!Array.isArray(s.weak))s.weak=[{num:'',topic:'',sub:''},{num:'',topic:'',sub:''}];
  if(!Array.isArray(s.items))s.items=Array.from({length:20},(_,i)=>({n:i+1,name:'',score:'',correct:true}));
  // homework 보정
  if(!s.homework||typeof s.homework!=='object')s.homework={show:true,rows:[{date:'날짜',stage:'없음',pct:0}]};

function save(){

  const id=form.id||'r_'+Date.now();form.id=id;form.savedAt=new Date().toISOString();

  if(!form.studentId&&form.name){
    const st=students.find(s=>s.name===form.name&&s.grade===form.grade);
    if(st)form.studentId=st.id;
  }
  // 등록부 반 동기화 (리포트에서 반 변경 시 등록부도 업데이트)
  if(form.studentId&&form.group){
    const stIdx=students.findIndex(s=>s.id===form.studentId);
    if(stIdx>=0&&students[stIdx].group!==form.group){
      students[stIdx].group=form.group;
      saveStudents();
    }
  }
  const idx=list.findIndex(s=>s.id===id);
  if(idx>=0)list[idx]=form;else list.unshift(form);
  saveList();saveMsg='저장 완료 ✓';render();setTimeout(()=>{saveMsg='';render();},2000);
}

/* ── PDF 처리 ── */
async function onFileChange(input){
  if(!apiKey){alert('먼저 API 키를 등록해주세요!\n\n⚙️ 설정 탭에서 등록하거나\n상단 노란 배너에서 입력하세요.');return;}
  const files=Array.from(input.files||[]).filter(f=>f.type.includes('pdf'));
  if(!files.length)return;
  files.forEach(f=>pdfStatus.push({name:f.name,st:'wait',err:''}));
  pdfQueue.push(...files);
  VIEW='analyzing';
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  render();
  if(!pdfProcessing)runQueue();
}

async function runQueue(){
  if(!pdfQueue.length){pdfProcessing=false;render();return;}
  pdfProcessing=true;
  const file=pdfQueue.shift();
  const qi=pdfStatus.findIndex(q=>q.st==='wait');
  if(qi>=0)pdfStatus[qi].st='proc';
  render();
  try{
    if(typeof pdfjsLib==='undefined'||!pdfjsLib.getDocument)throw new Error('PDF 분석 기능 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let text='';
    for(let i=1;i<=Math.min(pdf.numPages,8);i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(it=>it.str).join(' ')+'\n';
    }
    text=text.trim();
    if(!text||text.length<20)throw new Error('텍스트 없음 (이미지형 PDF)');
    const d=await callAPI(text,file.name);
    d.date=normalizeDate(d.date); // 저장 시 날짜 형식 통일
    d.id='r_'+Date.now();d.savedAt=new Date().toISOString();d._shareId=null;d.comment=d.comment||'';
    if(!d.homework)d.homework={show:true,rows:[{date:'날짜',stage:'없음',pct:0}]};
    list.unshift(d);saveList();
    if(qi>=0)pdfStatus[qi].st='done';
    render();
    autoFeedback(d);
  }catch(e){
    if(qi>=0){pdfStatus[qi].st='err';pdfStatus[qi].err=String(e.message||e).slice(0,80);}
    render();
  }
  await new Promise(r=>setTimeout(r,600));
  runQueue();
}

async function callAPI(text,filename){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:2000,
      messages:[{role:'user',content:`루멘수학 ONE REPORT PDF 텍스트입니다. 아래 JSON 형식으로만 응답. 마크다운 없이 순수 JSON만.

date 추출 규칙 (중요):
- PDF 텍스트 맨 앞(첫 줄)에 나오는 날짜를 사용. 예: "2026/3/17" → "2026.03.17"
- 형식: YYYY.MM.DD (월/일 한 자리면 두 자리로 변환)
- "03월 16일" 같은 수업/단원 날짜가 아닌, 문서 상단 생성 날짜 사용

testType 판단:
- 전국 인원수(예: "331명" "285명")나 "등수"가 있으면 → "weekly"
- 없으면 → "class"

파일명: ${filename}
텍스트:
${text.slice(0,4000)}

출력:
{"name":"","grade":"중학교 2학년","date":"","score":0,"level":0,"rank":null,"total":null,"avgScore":null,"comment":"","bookname":"","showRank":true,"testType":"class","units":[{"name":"","student":0,"avg":0}],"behaviors":[{"name":"문제해결역량","score":0,"grade":0,"desc":"수학 개념을 문제 상황에 적절히 활용"},{"name":"추론역량","score":0,"grade":0,"desc":"논리적으로 절차를 수행하는 능력"},{"name":"의사소통역량","score":0,"grade":0,"desc":"수학적 표현을 이해하고 정확하게 사용"},{"name":"연결역량","score":0,"grade":0,"desc":"개념·원리·법칙을 관련지어 이해"},{"name":"정보처리역량","score":0,"grade":0,"desc":"자료와 정보를 목적에 맞게 수집·정리"}],"strong":[{"num":0,"topic":"","sub":""}],"weak":[{"num":0,"topic":"","sub":""}],"items":[{"n":1,"name":"","score":0,"correct":true}],"homework":{"show":true,"rows":[{"date":"날짜","stage":"없음","pct":0}]}}`}]
    })
  });
  if(!resp.ok){const j=await resp.json();throw new Error(j.error?.message||'HTTP '+resp.status);}
  const j=await resp.json();
  const txt=j.content.map(c=>c.text||'').join('');
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

async function autoFeedback(d){
  if(!apiKey||!d.name)return;
  fbLoading=true;if(FT==='comment')render();
  try{

function bulkToggleAll(checked, targets){
  (targets||[]).forEach(r=>{bulkChecks[r.id]=checked;});
  render();
}

async function genFeedbackForStudent(r){
  const strong=(r.strong||[]).filter(s=>s.topic).map(s=>s.topic).join(', ')||'없음';
  const weak=(r.weak||[]).filter(w=>w.topic).map(w=>w.topic).join(', ')||'없음';
  const behaviors=(r.behaviors||[]).filter(b=>b.score).map(b=>`${b.name}(${b.score}%,${b.grade}등급)`).join(', ');
  const hwRows=(r.homework?.rows||[]).filter(row=>row.stage!=='없음');
  const hwSummary=hwRows.length?hwRows.map(row=>row.date+' '+row.stage+' '+row.pct+'%').join(', '):'없음';
  let filled=promptText
    .replace(/\{name\}/g,r.name).replace(/\{grade\}/g,r.grade)
    .replace(/\{score\}/g,r.score).replace(/\{level\}/g,r.level)
    .replace(/\{strong\}/g,strong).replace(/\{weak\}/g,weak)
    .replace(/\{behaviors\}/g,behaviors);
  const hasVars=promptText.includes('{name}')||promptText.includes('{score}');
  if(!hasVars){
    filled+=`\n\n[학생 정보]\n이름: ${r.name} / 학년: ${r.grade}\n점수: ${r.score}점 / 등급: ${r.level}등급\n목표점수: ${r.targetScore||'미설정'}\n우수유형: ${strong}\n취약유형: ${weak}\n역량: ${behaviors||'없음'}\n숙제완성도: ${hwSummary}`;
  }
  const memo=bulkMemos[r.id]||'';
  if(memo.trim()){
    filled+=`\n\n[선생님 특별 메모 - 아래 내용을 피드백에 자연스럽게 녹여서 작성해주세요]\n${memo.trim()}`;
  }
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:filled}]})
  });
  const j=await resp.json();
  let txt=j.content[0]?.text||'';
  txt=txt.replace(/^\[.*?\]\s*/,'').replace(/^안녕하세요[^.]*\.\s*/,'').replace(/^\s*\n/gm,'').trim();
  return txt;
}

async function runBulkFeedback(targets){
  if(!apiKey){alert('API 키를 먼저 등록해주세요 (설정 탭)');return;}
  const selected=(targets||[]).filter(r=>bulkChecks[r.id]!==false&&(bulkChecks[r.id]===true||!r.comment));
  if(!selected.length){alert('선택된 학생이 없습니다');return;}
  bulkLoading=true;
  bulkProgress={total:selected.length,done:0,current:''};
  render();
  for(const r of selected){
    bulkResults[r.id]='loading';
    bulkProgress.current=r.name;
    render();
    try{
      const txt=await genFeedbackForStudent(r);
      const idx=list.findIndex(s=>s.id===r.id);
      if(idx>=0){list[idx].comment=txt;}
      bulkResults[r.id]='done';
    }catch(e){
      bulkResults[r.id]='err';
      console.error('피드백 생성 실패:',r.name,e.message);
    }
    bulkProgress.done++;
    render();
    await new Promise(res=>setTimeout(res,400));
  }
  bulkLoading=false;
  bulkProgress={total:0,done:0,current:''};
  render();
}

function bulkSaveComment(id, txt){
  const idx=list.findIndex(s=>s.id===id);
  if(idx>=0){list[idx].comment=txt;saveList();}
}

function bulkChangeDate(){
  const inp=document.getElementById('bulk-date-inp');
  if(!inp||!inp.value){alert('날짜를 선택해주세요');return;}
  const newDate=inp.value.replace(/-/g,'.');
  // 체크된 학생 직접 계산
  const selected=list.filter(r=>bulkChecks[r.id]===true||(bulkChecks[r.id]!==false&&!r.comment));
  if(!selected.length){alert('체크된 학생이 없습니다');return;}
  selected.forEach(r=>{
    const idx=list.findIndex(s=>s.id===r.id);
    if(idx>=0)list[idx].date=newDate;
    if(form.id===r.id)form.date=newDate;
  });
  saveList();
  alert('✅ '+selected.length+'명의 날짜를 '+newDate+'로 변경했습니다!');
  render();
}

function bulkSaveAll(){
  saveList();
  // 현재 form에 열려있는 학생도 업데이트
  if(form.id){
    const updated=list.find(r=>r.id===form.id);
    if(updated)form=JSON.parse(JSON.stringify(updated));
  }
  bulkResults={};
  const cnt=Object.keys(bulkChecks).filter(id=>bulkChecks[id]!==false).length;
  alert(`✅ ${cnt}명 피드백이 저장됐습니다!`);
  render();
}

async function downloadAllStudents(){
  const groups=groupStudents();
  if(!groups.length){alert('저장된 학생이 없습니다');return;}
  const btn=document.getElementById('bulk-dl-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ 다운로드 중...';}
  let count=0;
  for(const g of groups){
    const all=list.filter(r=>r.name===g.name&&r.grade===g.grade)
      .sort((a,b)=>(normalizeDate(b.date)||'').localeCompare(normalizeDate(a.date)||''));
    if(!all.length)continue;
    const html=all.length>=1?buildMultiReportHTML(all):buildReportHTML(all[0]);
    const blob=new Blob(['\uFEFF'+html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const ld2=(all[0]?.date||'').replace(/\./g,'');
    a.download=`[학부모용]_${g.name}_${ld2}_루멘수학리포트.html`;
    a.click();
    URL.revokeObjectURL(url);
    count++;
    await new Promise(r=>setTimeout(r,400)); // 브라우저가 각 파일 처리할 시간
  }
  if(btn){btn.disabled=false;btn.textContent=`📥 전체 학생 일괄 다운로드 (${groups.length}명)`;}
  alert(`✅ ${count}명 학생 리포트가 다운로드됐어요!\n다운로드 폴더에서 확인해주세요.`);
}


function downloadStudentReport(){
  const d=form;
  if(!d.name){alert('학생 정보를 먼저 입력해주세요');return;}
  // 학생용: 3등급 이하는 등수 숨김 처리한 복사본
  let all=list.filter(r=>r.name===d.name&&r.grade===d.grade)
    .sort((a,b)=>(normalizeDate(b.date)||'').localeCompare(normalizeDate(a.date)||''));
  if(!all.find(r=>r.id===d.id)) all=[d,...all];
  const studentAll=all.map(r=>{
    const copy=JSON.parse(JSON.stringify(r));
    if(Number(copy.level)>2) copy.showRank=false; // 3등급↓ 등수 숨김
    return copy;
  });
  const html=studentAll.length>=1?buildMultiReportHTML(studentAll):buildReportHTML(studentAll[0]||d);
  const blob=new Blob(['\uFEFF'+html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');

function downloadReport(){

  if(!d.name){alert('학생 정보를 먼저 입력해주세요');return;}
  // 같은 학생의 모든 리포트 수집 (저장된 것 + 현재 편집 중인 것)
  let all=list.filter(r=>r.name===d.name&&r.grade===d.grade);
  all.sort((a,b)=>(b.savedAt||b.date||'').localeCompare(a.savedAt||a.date||''));
  // 현재 편집 중인 데이터가 목록에 없으면 앞에 추가 (저장 안 해도 다운로드 가능)
  if(!all.find(r=>r.id===d.id)) all=[d,...all];
  const html=buildMultiReportHTML(all);
  const blob=new Blob(['\uFEFF'+html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const latestDate=(d.date||'').replace(/\./g,''); // ★ form 날짜 기준
  a.download=`[학부모용]_${d.name}_${latestDate}_루멘수학리포트.html`;
  a.click();URL.revokeObjectURL(url);
}

/* ── 중복 학생 감지 및 통합 ── */
function detectDuplicates(){
  // 같은 이름이지만 학년이 다른 그룹 찾기 (리포트 기준)
  const all=groupStudents();
  const byName={};
  all.forEach(g=>{
    if(!byName[g.name])byName[g.name]=[];
    byName[g.name].push(g);
  });
  return Object.values(byName).filter(arr=>arr.length>1);
}

function detectStudentDbDuplicates(){
  const byName={};
  students.forEach(s=>{
    if(!byName[s.name])byName[s.name]=[];
    byName[s.name].push(s);
  });
  return Object.values(byName).filter(arr=>arr.length>1);
}

// 리포트 통합: name의 fromGrade 리포트들을 toGrade로 병합
function mergeReportGroups(name, toGrade, fromGrade){
  if(!confirm(`"${name}" 학생의 [${fromGrade.replace('학교','').replace('학년','년')}] 리포트를 [${toGrade.replace('학교','').replace('학년','년')}]으로 통합합니다.\n\n이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?`))return;
  // fromGrade → toGrade 로 학년 변경
  const toSt=students.find(s=>s.name===name&&s.grade===toGrade);
  list=list.map(r=>{
    if(r.name===name&&r.grade===fromGrade){
      r.grade=toGrade;
      if(toSt)r.studentId=toSt.id;
    }
    return r;
  });
  saveList();
  // 등록부에서 fromGrade 항목 제거 (있으면)
  const fromSt=students.find(s=>s.name===name&&s.grade===fromGrade);
  if(fromSt)students=students.filter(s=>s.id!==fromSt.id);
  saveStudents();
  MERGE_PENDING=null;
  SELECTED_STUDENT=name+'__'+toGrade;
  VIEW='student_detail';
  render();
  setTimeout(()=>alert(`✅ 통합 완료!\n모든 리포트가 [${toGrade}] 기준으로 합쳐졌습니다.`),100);
}

// 등록부 중복 통합
function mergeStudentDb(keepId, dropId){
  const keep=students.find(s=>s.id===keepId);
  const drop=students.find(s=>s.id===dropId);
  if(!keep||!drop)return;
  if(!confirm(`"${drop.name}" 등록부 중복을 통합합니다.\n유지: ${keep.grade||'학년미설정'}\n삭제: ${drop.grade||'학년미설정'}\n\n삭제 항목의 리포트는 유지 항목에 연결됩니다.`))return;
  // drop의 리포트 → keep으로 재연결 (학년도 통일)
  list=list.map(r=>{
    if(r.studentId===dropId||(!r.studentId&&r.name===drop.name&&r.grade===drop.grade)){
      r.studentId=keepId;
      if(keep.grade)r.grade=keep.grade;
    }
    return r;
  });
  saveList();
  students=students.filter(s=>s.id!==dropId);
  saveStudents();
  render();
  alert(`✅ 등록부 통합 완료!`);
}

  const reports=list.filter(r=>r.name===name&&r.grade===grade)
    .sort((a,b)=>(normalizeDate(b.date)||'').localeCompare(normalizeDate(a.date)||''));
  if(!reports.length){SELECTED_STUDENT=null;return rStudentGrid();}

  const latest=reports[0];
  const gc=latest.level?GC(latest.level):'#94a3b8';
  const scores=reports.filter(r=>r.score).map(r=>Number(r.score));
  const avgScore=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;

  // 등록부 학생 찾기 (studentId 우선, 없으면 이름+학년)
  const stInfo=students.find(s=>reports.some(r=>r.studentId&&r.studentId===s.id))
              ||students.find(s=>s.name===name&&s.grade===grade);

  // 재원일수 계산
  function calcDays(enrollDate){
    if(!enrollDate)return null;
    const nd=normalizeDate(enrollDate);if(!nd)return null;
    const p=nd.split('.');if(p.length<3)return null;
    const enroll=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.floor((today-enroll)/(1000*60*60*24));
    return diff>=0?diff:null;
  }

  // 테스트 타입 토글 함수
  function toggleType(id){
    const idx=list.findIndex(r=>r.id===id);
    if(idx<0)return;
    list[idx].testType=list[idx].testType==='weekly'?'class':'weekly';
    saveList();
    render();
  }

  let h=`<div style="padding:20px">
    <!-- 뒤로가기 -->
    <button onclick="SELECTED_STUDENT=null;VIEW='list';render()" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:16px;padding:0">

            </button>

          <div style="font-size:13px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px">${r.bookname||'-'}</div>

          <!-- 점수/등급 -->

          <!-- 피드백 여부 -->

            <button onclick="event.stopPropagation();loadAndShare('${r.id}')" title="공유"
              style="width:28px;height:28px;border:none;border-radius:7px;background:#f0fdf4;color:#059669;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">📤</button>

              style="width:28px;height:28px;border:none;border-radius:7px;background:#fff1f2;color:#dc2626;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">🗑</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
  return h;
}

// 학생 등록부
let DB_SEARCH='', DB_GRADE_FILTER='all'; // 검색/필터 상태

function rStudentDb(){
  // 재원일수 계산
  function daysEnrolled(enrollDate){
    if(!enrollDate)return null;
    const nd=normalizeDate(enrollDate);
    if(!nd)return null;
    const parts=nd.split('.');
    if(parts.length<3)return null;
    const enroll=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.floor((today-enroll)/(1000*60*60*24));
    return diff>=0?diff:null;
  }

  const groups=[...new Set(list.map(r=>r.group||'').filter(Boolean))].sort();

  // 필터링
  const gradeFilter={'초등':g=>g.startsWith('초'),'중학':g=>g.startsWith('중'),'고등':g=>g.startsWith('고'),'all':()=>true};
  const filtered=students.filter(st=>{
    const gOk=(gradeFilter[DB_GRADE_FILTER]||gradeFilter['all'])(st.grade||'');
    const sOk=!DB_SEARCH||st.name.includes(DB_SEARCH)||
      (st.nickname||'').includes(DB_SEARCH)||
      (st.parentPhone||'').includes(DB_SEARCH)||
      (st.studentPhone||'').includes(DB_SEARCH);
    return gOk&&sOk;
  });

  const dbDups=detectStudentDbDuplicates();

  let h=`<div style="padding:20px">
    <!-- 헤더 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:22px;font-weight:800;color:#0d2240">👤 학생 관리</div>
        <div style="font-size:13px;color:#64748b;margin-top:2px">총 ${students.length}명 등록 · 표시 ${filtered.length}명</div>
      </div>
      <button onclick="addNewStudent()" style="padding:11px 20px;background:linear-gradient(135deg,#0d2240,#1d6fe8);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">+ 학생 추가</button>
    </div>

    <!-- 필터 바 -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <!-- 학년 필터 탭 -->
      <div style="display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px">
        ${['all','초등','중학','고등'].map(v=>{
          const label={all:'전체',초등:'초',중학:'중',고등:'고'}[v];
          const cnt={all:students.length,초등:students.filter(s=>(s.grade||'').startsWith('초')).length,중학:students.filter(s=>(s.grade||'').startsWith('중')).length,고등:students.filter(s=>(s.grade||'').startsWith('고')).length}[v];
          const on=DB_GRADE_FILTER===v;
          return`<button onclick="DB_GRADE_FILTER='${v}';render()"
            style="padding:6px 14px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all 0.15s;background:${on?'white':'transparent'};color:${on?'#1d6fe8':'#64748b'};box-shadow:${on?'0 1px 4px rgba(0,0,0,0.1)':'none'}">${label} ${cnt}</button>`;
        }).join('')}
      </div>
      <!-- 검색 -->
      <div style="flex:1;min-width:160px;position:relative">
        <input id="db-search-inp" value="${DB_SEARCH}" oninput="DB_SEARCH=this.value;render()"
          placeholder="이름, 연락처 검색..."
          style="width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px 8px 32px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.15s"
          onfocus="this.style.borderColor='#3b84f7'" onblur="this.style.borderColor='#e2e8f0'">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none">🔍</span>
        ${DB_SEARCH?'<button onclick="DB_SEARCH=\'\';render()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;font-size:16px;color:#94a3b8;line-height:1">×</button>':''}
      </div>
    </div>

    ${dbDups.length?`
    <div style="background:#fff1f2;border:1.5px solid #fecaca;border-radius:14px;padding:14px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:800;color:#991b1b;margin-bottom:8px">⚠️ 등록부 중복 ${dbDups.length}건 — 통합이 필요합니다</div>
      ${dbDups.map(arr=>`
        <div style="background:white;border-radius:10px;padding:11px 14px;margin-bottom:7px;border:1px solid #fecaca">
          <div style="font-size:14px;font-weight:800;color:#0d2240;margin-bottom:8px">${arr[0].name}</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap">
            ${arr.map((st,i)=>`
              <button onclick="mergeStudentDb('${arr[1-i].id}','${arr[i].id}')"
                title="이 항목을 삭제하고 반대 항목으로 통합"
                style="flex:1;padding:9px 12px;background:#fff1f2;border:1.5px solid #fca5a5;border-radius:10px;cursor:pointer;font-family:inherit;text-align:left">
                <div style="font-size:12px;font-weight:700;color:#334155">${st.grade||'학년미설정'} ${st.group?'· '+st.group:''}</div>
                <div style="font-size:10px;color:#ef4444;margin-top:3px">🗑 이 항목 삭제</div>
              </button>`).join('')}
          </div>
        </div>`).join('')}
    </div>`:''}

    <!-- 테이블 -->
    <div style="background:white;border-radius:16px;border:1.5px solid #e8edf5;overflow:hidden">
      <!-- 헤더행 -->
      <div style="display:grid;grid-template-columns:160px 80px 70px 1fr 1fr 70px 90px;gap:0;background:#f8fafc;border-bottom:2px solid #e8edf5;padding:10px 14px;align-items:center">
        <div style="font-size:11px;font-weight:700;color:#94a3b8">이름 / 닉네임</div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8">학년</div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8">반</div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8">학부모 연락처</div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8">학생 연락처</div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-align:center">재원</div>
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-align:center">관리</div>
      </div>

      ${filtered.length===0?`
        <div style="padding:40px;text-align:center;color:#94a3b8">
          <div style="font-size:36px;margin-bottom:10px">${DB_SEARCH?'🔍':'👤'}</div>
          <div style="font-size:14px;font-weight:600">${DB_SEARCH?'"'+DB_SEARCH+'" 검색 결과 없음':'등록된 학생이 없어요'}</div>
        </div>
      `:''}

      ${filtered.map((st,i)=>{
        const days=daysEnrolled(st.enrollDate);
        const linkedCnt=list.filter(r=>r.studentId===st.id).length;
        const reportCnt=list.filter(r=>r.name===st.name&&r.grade===st.grade).length;
        return`<div style="display:grid;grid-template-columns:160px 80px 70px 1fr 1fr 70px 90px;gap:0;padding:11px 14px;align-items:center;border-bottom:1px solid #f1f5f9;background:white;transition:background 0.1s;cursor:pointer"
          onclick="selectStudent('${st.name.replace(/'/g,"\\'")}','${st.grade.replace(/'/g,"\\'")}');VIEW='student_detail'"
          onmouseenter="this.style.background='#f8fbff'"
          onmouseleave="this.style.background='white'">

          <!-- 이름/닉네임 -->
          <div>
            <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
              <span style="font-size:14px;font-weight:700;color:#0d2240">${st.name}</span>
              ${st.nickname?`<span style="font-size:11px;background:#eff6ff;color:#1d6fe8;padding:1px 7px;border-radius:20px">${st.nickname}</span>`:''}

function editStudent(id){
  const st=students.find(s=>s.id===id);
  if(!st)return;
  document.getElementById('edit-form-title').textContent='학생 편집';
  document.getElementById('edit-student-id').value=st.id;
  document.getElementById('edit-name').value=st.name;
  document.getElementById('edit-nickname').value=st.nickname||'';
  document.getElementById('edit-grade').value=st.grade||'';
  document.getElementById('edit-group').value=st.group||'';
  if(st.enrollDate){
    const nd=normalizeDate(st.enrollDate);
    if(nd)document.getElementById('edit-enroll').value=nd.replace(/\./g,'-');
  }
  document.getElementById('edit-memo').value=st.memo||'';

}

function saveStudentEdit(){
  const id=document.getElementById('edit-student-id').value;
  const name=document.getElementById('edit-name').value.trim();
  if(!name){alert('이름을 입력해주세요');return;}
  const data={
    name,
    nickname:document.getElementById('edit-nickname').value.trim(),
    grade:document.getElementById('edit-grade').value,
    group:document.getElementById('edit-group').value.trim(),
    enrollDate:normalizeDate(document.getElementById('edit-enroll').value),
    memo:document.getElementById('edit-memo').value.trim(),
    parentPhone:document.getElementById('edit-parent-phone').value.trim(),
    studentPhone:document.getElementById('edit-student-phone').value.trim(),
  };
  if(id){
    // 편집: 이름 또는 반 변경 시 기존 리포트도 업데이트
    const old=students.find(s=>s.id===id);
    const nameChanged=old&&old.name!==name;
    const groupChanged=old&&old.group!==data.group;
    if(nameChanged||groupChanged){
      list=list.map(r=>{
        if(r.name===(old?old.name:name)&&r.grade===(old?.grade||data.grade)){
          if(nameChanged)r.name=name;
          if(groupChanged&&data.group)r.group=data.group;
        }
        return r;
      });
      saveList();
    }
    const idx=students.findIndex(s=>s.id===id);
    if(idx>=0)students[idx]={...students[idx],...data};
    // 수정된 학생과 이름/학년 일치하는 리포트에 studentId 연결
    const updSt=students.find(s=>s.id===id);
    if(updSt){
      let linked=false;
      list.forEach(r=>{if(r.name===updSt.name&&r.grade===updSt.grade&&!r.studentId){r.studentId=updSt.id;linked=true;}});
      if(linked)saveList();
    }
  }else{
    // 신규 추가
    const newSt=migrateStudentDb(data);
    students.push(newSt);
    // 이름/학년 일치하는 기존 리포트에 studentId 연결
    let linked=false;
    list.forEach(r=>{if(r.name===newSt.name&&r.grade===newSt.grade&&!r.studentId){r.studentId=newSt.id;linked=true;}});
    if(linked)saveList();
  }
  saveStudents();
  document.getElementById('student-edit-form').style.display='none';
  render();
}

function deleteStudent(id){
  const st=students.find(s=>s.id===id);
  if(!st)return;
  const cnt=list.filter(r=>r.name===st.name&&r.grade===st.grade).length;
  const msg=st.name+' 학생을 삭제하시겠습니까?'+(cnt>0?'\n(리포트 '+cnt+'건은 유지됩니다)':'');
  if(!confirm(msg))return;
  students=students.filter(s=>s.id!==id);
  saveStudents();
  render();
}

// 학생별 그룹핑 (이름+학년 기준)
function groupStudents(){
  const map={};
  const filtered=FILTER_GROUP?list.filter(r=>(r.group||'')===FILTER_GROUP):list;
  filtered.forEach(r=>{
    const key=(r.name||'이름없음')+'__'+(r.grade||'');
    if(!map[key])map[key]={name:r.name||'이름없음',grade:r.grade||'',reports:[]};
    map[key].reports.push(r);
  });
  // 각 그룹 내 날짜순 정렬 (최신이 앞)
  Object.values(map).forEach(g=>{
    g.reports.sort((a,b)=>{
      const da=normalizeDate(a.date||'');
      const db=normalizeDate(b.date||'');
      return db.localeCompare(da); // 최신 날짜가 앞
    });
    // ★ currentGroup: 등록부 우선, 없으면 최신 리포트 기준
    const stInfo=students.find(s=>
      g.reports.some(r=>r.studentId&&r.studentId===s.id)||
      (s.name===g.name&&s.grade===g.grade)
    );
    g.currentGroup=stInfo?.group||g.reports[0]?.group||'';
  });
  return Object.values(map);
}

// 시험 종류별 성장 그래프 (폴더 카드용 미니)
function makeGrowthChart(reports){
  const weekly=reports.filter(r=>r.testType==='weekly'&&r.score).reverse();
  const cls=reports.filter(r=>r.testType!=='weekly'&&r.score).reverse();
  if(weekly.length<2&&cls.length<2)return'';

  const allScores=[...weekly,...cls].map(r=>Number(r.score));
  const mn=Math.max(0,Math.min(...allScores)-10);
  const mx=Math.min(100,Math.max(...allScores)+10);
  const W=150,H=40,PAD=5;

  function makePts(arr){
    if(arr.length<2)return{pts:[],scores:[]};
    const scores=arr.map(r=>Number(r.score));
    const xStep=(W-PAD*2)/(scores.length-1||1);
    const yScale=(H-PAD*2)/(mx-mn||1);
    const pts=scores.map((s,i)=>`${PAD+i*xStep},${H-PAD-(s-mn)*yScale}`);
    return{pts,scores};
  }

  const w=makePts(weekly);
  const c=makePts(cls);
  const wLatest=w.scores.length?w.scores[w.scores.length-1]:null;
  const cLatest=c.scores.length?c.scores[c.scores.length-1]:null;
  const wPrev=w.scores.length>=2?w.scores[w.scores.length-2]:null;
  const cPrev=c.scores.length>=2?c.scores[c.scores.length-2]:null;

  return`<div style="display:flex;align-items:center;gap:8px;margin-top:7px">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0;overflow:visible">
      ${w.pts.length>=2?`<polyline points="${w.pts.join(' ')}" fill="none" stroke="#0ea5e9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`:''}
      ${c.pts.length>=2?`<polyline points="${c.pts.join(' ')}" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`:''}
      ${w.pts.map((pt,i)=>{const[x,y]=pt.split(',');const cur=i===w.pts.length-1;return`<circle cx="${x}" cy="${y}" r="${cur?3:2}" fill="${cur?'#0369a1':'#7dd3fc'}"/>`;}).join('')}
      ${c.pts.map((pt,i)=>{const[x,y]=pt.split(',');const cur=i===c.pts.length-1;return`<circle cx="${x}" cy="${y}" r="${cur?3:2}" fill="${cur?'#15803d':'#86efac'}"/>`;}).join('')}
    </svg>
    <div style="font-size:10px;line-height:1.8">
      ${wLatest?`<div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:2px;background:#0ea5e9;border-radius:99px"></div><span style="color:#64748b">전국주간</span><span style="font-weight:700;color:${wLatest&&wPrev?(wLatest>wPrev?'#10b981':wLatest<wPrev?'#ef4444':'#94a3b8'):'#0369a1'}">${wLatest>wPrev?'↑':wLatest<wPrev?'↓':'→'}${wLatest}점</span></div>`:''}
      ${cLatest?`<div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:2px;background:#22c55e;border-radius:99px"></div><span style="color:#64748b">일일</span><span style="font-weight:700;color:${cLatest&&cPrev?(cLatest>cPrev?'#10b981':cLatest<cPrev?'#ef4444':'#94a3b8'):'#22c55e'}">${cLatest>cPrev?'↑':cLatest<cPrev?'↓':'→'}${cLatest}점</span></div>`:''}
    </div>
  </div>`;
}

// 숙제 완성도 요약
function makeHwSummary(reports){
  const allRows=[];
  reports.forEach(r=>{
    if(r.homework?.show&&r.homework?.rows){
      r.homework.rows.forEach(row=>{
        if(row.stage!=='없음')allRows.push(row);
      });
    }
  });
  if(!allRows.length)return'';
  const cnt={풀이:0,채점:0,오답:0,아하노트:0};
  allRows.forEach(r=>{if(cnt[r.stage]!==undefined)cnt[r.stage]++;});
  const total=allRows.length;
  const done=allRows.filter(r=>r.pct===100).length;
  return`<div style="display:flex;align-items:center;gap:7px;margin-top:7px;flex-wrap:wrap">
    <span style="font-size:10px;color:#7c3aed;font-weight:600">📓 숙제 ${total}회</span>
    <span style="font-size:10px;color:#15803d;background:#dcfce7;padding:2px 7px;border-radius:20px">100% ${done}회</span>
    ${Object.entries(cnt).filter(([,v])=>v>0).map(([s,v])=>`<span style="font-size:10px;background:${SS[s]?.bg||'#f1f5f9'};color:${SS[s]?.text||'#94a3b8'};padding:2px 7px;border-radius:20px">${s} ${v}</span>`).join('')}
  </div>`;
}

    h+=`<button class="side-group-item ${MENU_GROUP==='none'?'on':''}"

        h+=`<button onclick="selectStudent('${g2.name}','${g2.grade}')"

      <span style="font-size:15px">📥</span> 전체 다운로드

  }

  return h;

function rAnalyzing(){
  const done=pdfStatus.filter(q=>q.st==='done').length;
  const err=pdfStatus.filter(q=>q.st==='err').length;
  const total=pdfStatus.length;
  const finished=done+err;
  const pct=total?Math.round((finished/total)*100):0;
  const allDone=finished===total&&!pdfProcessing;
  let h=`<div style="padding:14px">
    <div class="prog-box" style="border-left:3px solid #1d6fe8">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        ${!allDone?`<svg width="16" height="16" viewBox="0 0 16 16" class="spin"><circle cx="8" cy="8" r="6" fill="none" stroke="#e0f2fe" stroke-width="2.5"/><path d="M8 2 A6 6 0 0 1 14 8" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/></svg>`:''}
        <div style="font-size:14px;font-weight:700">${allDone?(err===total?'⚠️ 오류 발생':'✅ 분석 완료!'):'✨ PDF 분석 중...'}</div>
      </div>
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">${allDone?`${done}개 완료${err?' · '+err+'개 오류':''}`:`${finished} / ${total} · 파일당 15~30초 소요`}</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:#0ea5e9;text-align:right;font-weight:700">${pct}%</div>
    </div>
    <div style="background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px">`;
  pdfStatus.forEach((q,i)=>{
    const icon=q.st==='proc'?`<svg width="15" height="15" viewBox="0 0 16 16" class="spin"><circle cx="8" cy="8" r="6" fill="none" stroke="#e0f2fe" stroke-width="2.5"/><path d="M8 2 A6 6 0 0 1 14 8" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/></svg>`:q.st==='done'?'<span style="color:#10b981;font-size:14px;font-weight:700">✓</span>':q.st==='err'?'<span style="color:#ef4444;font-size:14px">✗</span>':'<span style="color:#cbd5e1;font-size:12px">○</span>';
    const color=q.st==='done'?'#10b981':q.st==='err'?'#ef4444':q.st==='proc'?'#7c3aed':'#94a3b8';
    const label=q.st==='wait'?'대기':q.st==='proc'?'분석 중':q.st==='done'?'완료':'오류';
    const border=i<pdfStatus.length-1?'border-bottom:1px solid #f8fafc':'';
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;${border}">
      <div style="width:18px;text-align:center;flex-shrink:0">${icon}</div>
      <div style="flex:1;min-width:0"><div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${q.name}</div>${q.err?`<div style="font-size:10px;color:#ef4444;margin-top:2px">${q.err}</div>`:''}</div>
      <div style="font-size:11px;color:${color};font-weight:700;flex-shrink:0">${label}</div>
    </div>`;
  });
  h+=`</div>`;
  if(allDone){
    h+=`<button style="width:100%;padding:14px;background:linear-gradient(135deg,#0d2240,#1d6fe8);color:white;border:none;border-radius:var(--r);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:8px;box-shadow:0 4px 16px rgba(29,111,232,0.3);letter-spacing:0.2px" onclick="pdfStatus=[];go('list')">📋 학생 목록 보기 (${done}명)</button>`;
    if(err>0)h+=`<div class="wbox">⚠️ 오류 파일은 이미지형 PDF이거나 API 키 문제일 수 있어요</div>`;
  }else{
    h+=`<div class="ibox">⏱ 창을 닫지 마세요 · 완료되면 자동으로 목록에 추가돼요</div>`;
  }
  return h+`</div>`;
}

function buildPreviewGrowthChart(reports){
  const weekly=reports.filter(r=>r.testType==='weekly'&&r.score);
  const cls=reports.filter(r=>r.testType!=='weekly'&&r.score);
  if(!weekly.length&&!cls.length)return'';  // 둘 다 0개일 때만 숨김

  const allScores=[...weekly,...cls].map(r=>Number(r.score));
  const rawMin=Math.min(...allScores);
  const rawMax=Math.max(...allScores);
  const mn=Math.max(0,rawMin-10);
  const mx=Math.min(100,rawMax+10);

  const W=320, H=120, PADX=14, PADY=22, LABEL_H=18;
  const chartH=H-PADY*2-LABEL_H;

  function makePts(arr){
    if(!arr.length)return{pts:[],scores:[],dates:[]};
    const scores=arr.map(r=>Number(r.score));
    const dates=arr.map(r=>(r.date||'').slice(5).replace('.','/'));
    const xStep=arr.length>1?(W-PADX*2)/(scores.length-1):0;
    const xOffset=arr.length===1?(W/2):PADX; // 1개면 가운데
    const yScale=chartH/(mx-mn||1);
    const pts=scores.map((s,i)=>`${xOffset+i*xStep},${PADY+chartH-(s-mn)*yScale}`);
    return{pts,scores,dates};
  }

  const w=makePts(weekly);
  const c=makePts(cls);

  const wLatest=w.scores.length?w.scores[w.scores.length-1]:null;
  const wPrev=w.scores.length>=2?w.scores[w.scores.length-2]:null;
  const cLatest=c.scores.length?c.scores[c.scores.length-1]:null;
  const cPrev=c.scores.length>=2?c.scores[c.scores.length-2]:null;

  const wTrend=wLatest&&wPrev?(wLatest>wPrev?`↑${wLatest-wPrev}`:wLatest<wPrev?`↓${wPrev-wLatest}`:'→'):(wLatest?'':'');
  const cTrend=cLatest&&cPrev?(cLatest>cPrev?`↑${cLatest-cPrev}`:cLatest<cPrev?`↓${cPrev-cLatest}`:'→'):(cLatest?'':'');
  const wTc=wLatest&&wPrev?(wLatest>wPrev?'#10b981':wLatest<wPrev?'#ef4444':'#94a3b8'):'#0ea5e9';
  const cTc=cLatest&&cPrev?(cLatest>cPrev?'#10b981':cLatest<cPrev?'#ef4444':'#94a3b8'):'#22c55e';

  const showLabel=(i,len)=>len<=5||i>=len-2;

  const svgLines=[
    // 선 (2개 이상일 때만)
    w.pts.length>=2?`<polyline points="${w.pts.join(' ')}" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`:'',
    c.pts.length>=2?`<polyline points="${c.pts.join(' ')}" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`:'',
    // 점 + 라벨 (1개여도 표시)
    ...w.pts.map((pt,i)=>{
      const[x,y]=pt.split(',');const cur=i===w.pts.length-1;const show=showLabel(i,w.pts.length);
      return`<circle cx="${x}" cy="${y}" r="${cur?4.5:2.5}" fill="${cur?'#0369a1':'#7dd3fc'}" stroke="white" stroke-width="1"/>
      ${show?`<text x="${x}" y="${Number(y)-7}" text-anchor="middle" fill="${cur?'#0369a1':'#64748b'}" font-size="${cur?10:8}" font-weight="${cur?'700':'400'}" font-family="sans-serif">${w.scores[i]}</text>`:''}`;
    }),
    ...c.pts.map((pt,i)=>{
      const[x,y]=pt.split(',');const cur=i===c.pts.length-1;const show=showLabel(i,c.pts.length);
      return`<circle cx="${x}" cy="${y}" r="${cur?4.5:2.5}" fill="${cur?'#15803d':'#86efac'}" stroke="white" stroke-width="1"/>
      ${show?`<text x="${x}" y="${Number(y)+14}" text-anchor="middle" fill="${cur?'#15803d':'#64748b'}" font-size="${cur?10:8}" font-weight="${cur?'700':'400'}" font-family="sans-serif">${c.scores[i]}</text>`:''}`;
    }),
  ].join('');

  return`<div style="background:white;border-radius:14px;padding:14px;margin-top:12px;border:1px solid #e8eef8">
    <div style="font-size:12px;font-weight:700;color:#0369a1;margin-bottom:8px">📈 성장 추이</div>
    <div style="display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap">
      ${w.scores.length?`<div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:2.5px;background:#0ea5e9;border-radius:99px"></div><span style="font-size:11px;color:#64748b">전국주간</span><span style="font-size:12px;font-weight:700;color:${wTc}">${wTrend?wTrend+' ':''}${wLatest}점</span></div>`:''}
      ${c.scores.length?`<div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:2.5px;background:#22c55e;border-radius:99px"></div><span style="font-size:11px;color:#64748b">일일테스트</span><span style="font-size:12px;font-weight:700;color:${cTc}">${cTrend?cTrend+' ':''}${cLatest}점</span></div>`:''}
    </div>
    <svg width="100%" height="${H+4}" viewBox="0 0 ${W} ${H+4}" preserveAspectRatio="none" style="display:block;overflow:visible">
      ${[0,25,50,75,100].filter(v=>v>=mn&&v<=mx).map(v=>{
        const y=PADY+chartH-(v-mn)/(mx-mn)*chartH;
        return`<line x1="${PADX}" y1="${y}" x2="${W-PADX}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>
        <text x="${PADX-3}" y="${y+3}" text-anchor="end" fill="#cbd5e1" font-size="8" font-family="sans-serif">${v}</text>`;
      }).join('')}
      ${svgLines}
    </svg>
  </div>`;
}

function makeDateDropdown(currentId){
  const d=form;
  if(!d.name)return'';
  const same=list.filter(r=>r.name===d.name&&r.grade===d.grade)
    .sort((a,b)=>(normalizeDate(b.date)||'').localeCompare(normalizeDate(a.date)||''));

function navigatePreview(dir){
  const d=form;if(!d.name)return;
  const same=list.filter(r=>r.name===d.name&&r.grade===d.grade)
    .sort((a,b)=>(normalizeDate(b.date)||'').localeCompare(normalizeDate(a.date)||''));
  const idx=same.findIndex(r=>r.id===d.id);
  const next=idx+dir;
  if(next>=0&&next<same.length)loadAndPreview(same[next].id);
}

    units.filter(u=>u&&u.name).forEach(u=>{h+=`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:600;color:#334155">${u.name}</span><span style="font-size:12px;font-weight:700;color:${SC(u.student)}">${u.student}%</span></div><div style="height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;position:relative">${u.avg?`<div style="position:absolute;height:100%;width:${u.avg}%;background:#cbd5e1;border-radius:99px"></div>`:''}<div style="position:absolute;height:100%;width:${u.student}%;background:${SC(u.student)};border-radius:99px"></div></div>${u.avg?`<div style="font-size:9px;color:#94a3b8;margin-top:2px">● 학생 ◌ 전국평균 ${u.avg}%</div>`:''}</div>`;});

  }
  if(hs.length||hw.length){
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px">
      <div style="background:white;border-radius:14px;padding:12px;border:1px solid #d1fae5"><div style="font-size:11px;font-weight:700;color:#059669;margin-bottom:8px">✨ 우수 유형</div>${hs.map(s=>`<div style="display:flex;gap:5px;margin-bottom:7px"><div style="width:20px;height:20px;border-radius:4px;background:#ecfdf5;border:1px solid #6ee7b7;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#059669;flex-shrink:0">${s.num}</div><div><div style="font-size:10px;font-weight:600;color:#334155;line-height:1.3">${s.topic}</div><div style="font-size:9px;color:#94a3b8">${s.sub||''}</div></div></div>`).join('')}</div>
      <div style="background:white;border-radius:14px;padding:12px;border:1px solid #fee2e2"><div style="font-size:11px;font-weight:700;color:#dc2626;margin-bottom:8px">🎯 집중 보완</div>${hw.map(w=>`<div style="display:flex;gap:5px;margin-bottom:7px"><div style="width:20px;height:20px;border-radius:4px;background:#fff1f2;border:1px solid #fca5a5;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#dc2626;flex-shrink:0">${w.num}</div><div><div style="font-size:10px;font-weight:600;color:#334155;line-height:1.3">${w.topic}</div><div style="font-size:9px;color:#94a3b8">${w.sub||''}</div></div></div>`).join('')}</div>
    </div>`;
  }
  if(behaviors.some(b=>b&&b.score)){
    const bv2=behaviors.filter(b=>b&&b.score);
    if(bv2.length>=3){
      const N2=bv2.length,CX2=110,CY2=95,R2=65;
      const angles2=bv2.map((_,i)=>(Math.PI*2*i/N2)-Math.PI/2);
      const pt2=(r,i)=>({x:CX2+r*Math.cos(angles2[i]),y:CY2+r*Math.sin(angles2[i])});
      const grid2=[0.25,0.5,0.75,1].map((lv,gi)=>{
        const pts2=bv2.map((_,i)=>{const p=pt2(R2*lv,i);return`${p.x},${p.y}`;}).join(' ');
        return`<polygon points="${pts2}" fill="${gi===3?'none':'rgba(30,58,110,0.03)'}" stroke="rgba(30,58,110,${gi===3?'0.15':'0.08'})" stroke-width="${gi===3?'1.5':'1'}"/>`;
      }).join('');
      const axes2=bv2.map((_,i)=>{const p=pt2(R2,i);return`<line x1="${CX2}" y1="${CY2}" x2="${p.x}" y2="${p.y}" stroke="rgba(30,58,110,0.1)" stroke-width="1"/>`;}).join('');
      const data2=bv2.map((b,i)=>{const p=pt2(R2*(Number(b.score)||0)/100,i);return`${p.x},${p.y}`;}).join(' ');
      const labels2=bv2.map((b,i)=>{
        const lp=pt2(R2+19,i);
        const anc=Math.cos(angles2[i])>0.1?'start':Math.cos(angles2[i])<-0.1?'end':'middle';
        const col=GC(b.grade);
        return`<text x="${lp.x}" y="${lp.y+3}" text-anchor="${anc}" font-size="9.5" font-weight="700" fill="#334155" font-family="'Noto Sans KR',sans-serif">${b.name}</text>`
          +`<text x="${lp.x}" y="${lp.y+14}" text-anchor="${anc}" font-size="9" font-weight="700" fill="${col}" font-family="sans-serif">${b.score}%</text>`;
      }).join('');
      const dots2=bv2.map((b,i)=>{const p=pt2(R2*(Number(b.score)||0)/100,i);return`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#1d6fe8" stroke="white" stroke-width="1.5"/>`;}).join('');

        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <svg width="220" height="190" viewBox="0 0 220 190" style="flex-shrink:0;display:block">
            ${grid2}${axes2}
            <polygon points="${data2}" fill="rgba(29,111,232,0.12)" stroke="#1d6fe8" stroke-width="2" stroke-linejoin="round"/>
            ${labels2}${dots2}
          </svg>
          <div style="flex:1;min-width:90px;display:flex;flex-direction:column;gap:6px">
            ${bv2.map(b=>{const col=GC(b.grade);return`<div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0"></div><span style="font-size:11px;color:#475569;flex:1">${b.name}</span><span style="font-size:11px;font-weight:800;color:${col}">${b.score}%</span>${b.grade?`<span style="font-size:9px;font-weight:700;background:${col}18;color:${col};padding:1px 6px;border-radius:20px">${b.grade}등</span>`:''}</div>`;}).join('')}
          </div>
        </div>
      </div>`;
    } else {
      h+=`<div style="background:white;border-radius:14px;padding:14px;margin-top:10px;border:1px solid #e8eef8"><div style="font-size:11px;font-weight:800;color:#0d2240;margin-bottom:11px;letter-spacing:0.5px;text-transform:uppercase">🧠 역량별 분석</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">`;
      behaviors.filter(b=>b&&b.score).forEach(b=>{h+=`<div style="background:#f8fafc;border-radius:10px;padding:10px"><span style="font-size:11px;font-weight:700;color:#334155">${b.name||''}</span><div style="height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin:5px 0"><div style="height:100%;width:${b.score}%;background:${GC(b.grade)};border-radius:99px"></div></div><div style="font-size:12px;font-weight:700;color:${GC(b.grade)}">${b.score}%</div></div>`;});
      h+=`</div></div>`;
    }
  }
  if(items.some(it=>it&&it.name)){
    const namedItems=items.filter(it=>it&&it.name);
    const correctI=namedItems.filter(it=>it.correct);
    const wrongI=namedItems.filter(it=>!it.correct);
    const accId2='pv_acc_'+(Date.now()%99999);
    const itemRowPv=it=>{const col=SC(it.score);return`<div style="display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:1px solid #f8fafc"><div style="width:26px;height:26px;border-radius:7px;background:${it.correct?'#ecfdf5':'#fff1f2'};border:1px solid ${it.correct?'#6ee7b7':'#fca5a5'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${it.correct?'#059669':'#dc2626'};flex-shrink:0">${it.n}</div><div style="flex:1;font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.name}</div><div style="width:50px;height:5px;background:#f1f5f9;border-radius:99px;flex-shrink:0;overflow:hidden"><div style="height:100%;width:${it.score||0}%;background:${col};border-radius:99px"></div></div><span style="font-size:10px;font-weight:700;color:${col};min-width:26px;text-align:right">${it.score}%</span></div>`;};
    h+=`<div style="background:white;border-radius:16px;margin-top:10px;border:1px solid #e8eef8;overflow:hidden">
      <div style="padding:13px 14px 10px;border-bottom:1px solid #f1f5f9">
        <div style="font-size:11px;font-weight:800;color:#0d2240;letter-spacing:0.5px;text-transform:uppercase">📝 문항별 상세 결과</div>
        <div style="display:flex;gap:7px;margin-top:8px">
          <div style="display:flex;align-items:center;gap:5px;background:#ecfdf5;border-radius:8px;padding:4px 10px"><span style="font-size:12px">✅</span><span style="font-size:11px;font-weight:700;color:#059669">정답 ${correctI.length}문항</span></div>
          <div style="display:flex;align-items:center;gap:5px;background:#fff1f2;border-radius:8px;padding:4px 10px"><span style="font-size:12px">❌</span><span style="font-size:11px;font-weight:700;color:#dc2626">오답 ${wrongI.length}문항</span></div>
        </div>
        <div style="font-size:10px;color:#94a3b8;margin-top:6px;display:flex;align-items:center;gap:3px">👆 항목을 누르면 문항을 자세히 볼 수 있어요</div>
      </div>
      ${wrongI.length?`<div>
        <button onclick="(function(){var el=document.getElementById('wpv_${accId2}');var btn=document.getElementById('wbpv_${accId2}');el.style.display=el.style.display==='none'?'block':'none';btn.textContent=el.style.display==='none'?'▼':'▲';})()" style="width:100%;padding:9px 14px;background:#fff8f8;border:none;border-bottom:1px solid #fee2e2;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit">
          <div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px">❌</span><span style="font-size:11px;font-weight:700;color:#dc2626">집중 보완 (${wrongI.length}개)</span></div>
          <div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px;color:#dc2626;opacity:0.7">👆 눌러서 접기</span><span id="wbpv_${accId2}" style="font-size:10px;color:#dc2626;font-weight:700">▲</span></div>
        </button>
        <div id="wpv_${accId2}">${wrongI.map(itemRowPv).join('')}</div>
      </div>`:''}
      ${correctI.length?`<div>
        <button onclick="(function(){var el=document.getElementById('cpv_${accId2}');var btn=document.getElementById('cbpv_${accId2}');el.style.display=el.style.display==='none'?'block':'none';btn.textContent=el.style.display==='none'?'▼':'▲';})()" style="width:100%;padding:9px 14px;background:#f8fffe;border:none;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit">
          <div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px">✅</span><span style="font-size:11px;font-weight:700;color:#059669">정답 문항 (${correctI.length}개)</span></div>
          <div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px;color:#059669;opacity:0.7">👆 눌러서 펼치기</span><span id="cbpv_${accId2}" style="font-size:10px;color:#059669;font-weight:700">▼</span></div>
        </button>
        <div id="cpv_${accId2}" style="display:none">${correctI.map(itemRowPv).join('')}</div>
      </div>`:''}
    </div>`;
  }

  // 숙제 완성도 미리보기
  if(d.homework?.show&&(d.homework?.rows||[]).length){
    const hwr=d.homework.rows;
    const summary={};hwr.forEach(r=>{if(r.stage!=='없음')summary[r.stage]=(summary[r.stage]||0)+1;});
    h+=`<div style="background:white;border-radius:14px;padding:14px;margin-top:10px;border:1px solid #e8eef8">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:11px;font-weight:800;color:#0d2240;letter-spacing:0.5px;text-transform:uppercase">📓 숙제 완성도</div>
        <div style="display:flex;gap:5px">
          ${(()=>{
            const allSame=list.filter(r=>r.name===d.name&&r.grade===d.grade);
            const allHw=allSame.flatMap(r=>(r.homework?.rows||[]).filter(rw=>rw.stage!=='없음'));
            if(allHw.length<2)return'';
            const weeks=allHw.slice(-8);
            const stageColors={'풀이':'#3b82f6','채점':'#f59e0b','오답':'#22c55e','아하노트':'#a855f7'};
            return weeks.map(rw=>{
              const col=stageColors[rw.stage]||'#e2e8f0';
              const op=Math.max(0.3,(rw.pct||0)/100);
              return '<div title="'+rw.date+' '+rw.stage+' '+rw.pct+'%" style="width:20px;height:20px;border-radius:5px;background:'+col+';opacity:'+op+';cursor:default"></div>';
            }).join('');
          })()}
        </div>
      </div>`;
    if(Object.keys(summary).length){
      h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">`;
      Object.entries(summary).forEach(([s,c])=>{const v=SS[s];h+=`<div style="display:flex;align-items:center;gap:4px;background:#f8fafc;border-radius:20px;padding:3px 9px;font-size:10px;color:#334155"><div style="width:7px;height:7px;border-radius:50%;background:${v.bar}"></div>${s} ${c}회</div>`;});
      h+=`</div>`;
    }
    hwr.forEach(r=>{const sv=SS[r.stage]||SS['없음'];const pv=PS[r.pct]||PS[0];
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f8fafc"><span style="font-size:11px;color:#64748b;min-width:62px;flex-shrink:0">${r.date}</span><span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:${sv.bg};color:${sv.text};flex-shrink:0">${r.stage}</span><div style="flex:1;height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden"><div style="height:100%;width:${r.pct}%;background:${sv.bar};border-radius:99px"></div></div><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:${pv.bg};color:${pv.text};flex-shrink:0">${r.pct}%</span></div>`;
    });
    h+=`<div style="background:#f8fafc;border-radius:10px;padding:11px 12px;margin-top:11px">
      <div style="font-size:11px;font-weight:700;color:#334155;margin-bottom:8px">📖 숙제 단계 안내</div>
      ${Object.entries(SS).filter(([k])=>k!=='없음').map(([s,v])=>`<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:6px"><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:${v.bg};color:${v.text};flex-shrink:0;margin-top:1px">${s}</span><span style="font-size:11px;color:#64748b;line-height:1.5">${HW_GUIDE[s]||''}</span></div>`).join('')}
      <div style="font-size:10px;color:#94a3b8;margin-top:7px;padding-top:7px;border-top:1px solid #e2e8f0;line-height:1.7">💡 완성도: 0% 시작 전 · 30% 진행 중 · 60% 절반 이상 · 100% 완전 완료 ✅</div>
    </div></div>`;
  }

  h+=`<div style="text-align:center;margin-top:13px;font-size:10px;color:#94a3b8">🏫 ${schoolName||'루멘수학'} · Lumen Math Academy</div></div></div>`;
  return h;
}


function copyKakaoMsg(){
  const d=form;
  if(!d.name){alert('학생 정보를 먼저 입력해주세요');return;}
  const sn=schoolName||'루멘수학';
  const tn=teacherName?teacherName:'선생님';
  const testLabel=d.testType==='weekly'?'전국주간테스트':'수업 테스트';
  const strong=(d.strong||[]).filter(s=>s.topic).map(s=>s.topic).slice(0,2).join(', ')||'-';
  const weak=(d.weak||[]).filter(w=>w.topic).map(w=>w.topic).slice(0,2).join(', ')||'-';
  const hwRows=(d.homework?.rows||[]).filter(r=>r.stage!=='없음');
  const hwLast=hwRows.length?hwRows[hwRows.length-1]:null;
  const rankLine=(d.rank&&d.total&&d.showRank)?`\n📊 전국 등수: ${d.rank}등 / ${d.total}명 (상위 ${Math.round((Number(d.rank)/Number(d.total))*100)}%)`:'';
  const hwLine=hwLast?`\n📓 최근 숙제: ${hwLast.date} ${hwLast.stage} ${hwLast.pct}% 완성`:'';
  const commentLine=d.comment?`\n\n💬 ${tn} 코멘트\n${d.comment.slice(0,120)}${d.comment.length>120?'..':''}`:'' ;
  const msg=`안녕하세요, ${sn} ${tn}입니다 😊\n${d.name} 학생 학습 리포트를 보내드립니다.\n\n📅 ${d.date} · ${testLabel}\n📚 ${d.bookname||''}\n\n✏️ 점수: ${d.score||'-'}점  |  등급: ${d.level||'-'}등급${rankLine}\n\n✨ 우수 유형: ${strong}\n🎯 집중 보완: ${weak}${hwLine}${commentLine}\n\n📱 상세 리포트 파일을 함께 첨부해 드렸습니다.\n확인 후 문의사항 있으시면 편하게 연락 주세요 🙏`.trim();
  navigator.clipboard.writeText(msg).then(()=>{
    const btn=document.getElementById('kakao-copy-btn');
    if(btn){btn.textContent='✅ 복사됨!';btn.style.background='linear-gradient(135deg,#059669,#10b981)';setTimeout(()=>{btn.textContent='💬 카카오톡 메시지 복사';btn.style.background='linear-gradient(135deg,#f9a825,#f57f17)';},2200);}
  }).catch(()=>{
    // clipboard API 안되면 직접 보여주기
    const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    alert('클립보드에 복사됐습니다!\n카카오톡에 붙여넣기 하세요.');
  });
}

/* ── 데이터 백업/복원 ── */
function exportData(){
  const data={version:2,exportedAt:new Date().toISOString(),school:schoolName,teacher:teacherName,students:list};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  a.download=`루멘수학_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.students||!Array.isArray(data.students))throw new Error('올바른 백업 파일이 아닙니다');
      const cnt=data.students.length;
      if(!confirm(`백업 파일에 학생 ${cnt}명 데이터가 있습니다.\n현재 데이터와 병합하시겠습니까?\n(취소 → 덮어쓰기)`)){
        list=data.students.map(migrateStudent);
      }else{
        const existIds=new Set(list.map(r=>r.id));
        const newOnes=data.students.filter(r=>!existIds.has(r.id)).map(migrateStudent);
        list=[...list,...newOnes];
      }
      if(data.school&&!schoolName){schoolName=data.school;localStorage.setItem('or_school',schoolName);}
      saveList();render();
      alert(`✅ 복원 완료! 총 ${list.length}건`);
    }catch(err){alert('오류: '+err.message);}
  };
  reader.readAsText(file);
}

/* ── 월간 리포트 생성 ── */
function buildMonthlyReport(yearMonth){
  // yearMonth: "2026.03" 형식
  const [yr,mo]=yearMonth.split('.');
  const monthData=list.filter(r=>{
    const d=r.date||'';
    return d.startsWith(yr+'.'+mo)||d.startsWith(yr+'.0'+mo.replace(/^0/,''));
  });
  if(!monthData.length)return null;
  const groups={};
  monthData.forEach(r=>{
    const k=(r.name||'이름없음')+'__'+(r.grade||'');
    if(!groups[k])groups[k]={name:r.name||'이름없음',grade:r.grade||'',reports:[]};
    groups[k].reports.push(r);
  });
  const sn=schoolName||'루멘수학';
  const monthLabel=`${yr}년 ${Number(mo)}월`;
  let body=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>${monthLabel} 월간 리포트 - ${sn}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f0f4f8;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;padding:16px}
.card{background:white;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(13,34,64,0.08);border:1px solid #e8eef8}
.hdr{background:linear-gradient(135deg,#0d2240,#1d6fe8);color:white;border-radius:16px;padding:20px;margin-bottom:16px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.bar-w{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-top:4px}
.bar-f{height:100%;border-radius:99px}
</style></head><body>
<div class="hdr">
  <div style="font-size:10px;opacity:0.6;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin-bottom:8px">🏫 ${sn} · MONTHLY REPORT</div>
  <div style="font-size:24px;font-weight:900;letter-spacing:-0.5px">${monthLabel} 월간 학습 리포트</div>
  <div style="font-size:13px;opacity:0.7;margin-top:4px">총 ${Object.keys(groups).length}명 · ${monthData.length}회 진단</div>
</div>`;

  Object.values(groups).forEach(g=>{
    const reps=g.reports.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const scores=reps.filter(r=>r.score).map(r=>Number(r.score));
    const avgScore=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
    const firstScore=scores[0]||null;
    const lastScore=scores[scores.length-1]||null;
    const trend=firstScore&&lastScore&&scores.length>1?(lastScore-firstScore):null;
    const trendCol=trend===null?'#94a3b8':trend>0?'#059669':trend<0?'#dc2626':'#94a3b8';
    const trendStr=trend===null?'-':trend>0?'↑'+trend+'점':trend<0?'↓'+Math.abs(trend)+'점':'→ 변동없음';
    const hwRows=reps.flatMap(r=>(r.homework?.rows||[]).filter(rw=>rw.stage!=='없음'));
    const hwDone=hwRows.filter(r=>r.pct===100).length;
    const latestLevel=reps.filter(r=>r.level).slice(-1)[0]?.level||'-';
    const gc=n=>{const v=Number(n);if(v<=1)return'#10b981';if(v===2)return'#3b82f6';if(v===3)return'#f59e0b';if(v===4)return'#f97316';return'#ef4444';};
    body+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-size:17px;font-weight:900;color:#0d2240;letter-spacing:-0.3px">${g.name}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${g.grade}${g.reports[0]?.group?' · '+g.reports[0].group:''}</div>
        </div>
        <div style="text-align:right">
          <span class="badge" style="background:${gc(latestLevel)}18;color:${gc(latestLevel)}">${latestLevel}등급</span>
          <div style="font-size:11px;color:#94a3b8;margin-top:3px">${reps.length}회 진단</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
        <div style="background:#f8fafc;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#94a3b8;margin-bottom:3px">평균 점수</div>
          <div style="font-size:20px;font-weight:800;color:#1d6fe8">${avgScore||'-'}<span style="font-size:11px">점</span></div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#94a3b8;margin-bottom:3px">성장</div>
          <div style="font-size:18px;font-weight:800;color:${trendCol}">${trendStr}</div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#94a3b8;margin-bottom:3px">숙제 100%</div>
          <div style="font-size:20px;font-weight:800;color:#7c3aed">${hwRows.length?hwDone+'/'+hwRows.length:'-'}</div>
        </div>
      </div>
      <div style="font-size:11px;color:#475569;border-top:1px solid #f1f5f9;padding-top:10px">
        ${reps.map(r=>`<span style="display:inline-block;background:#eff6ff;color:#1d6fe8;border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;margin:2px">${r.date} ${r.score?r.score+'점':''}</span>`).join('')}
      </div>
      ${reps.slice(-1)[0]?.comment?`<div style="background:linear-gradient(135deg,#0d2240,#1a3564);border-radius:12px;padding:12px 14px;margin-top:10px;color:white"><div style="font-size:9px;font-weight:800;letter-spacing:1px;opacity:0.7;margin-bottom:5px">💬 최근 총평</div><div style="font-size:12px;line-height:1.8;opacity:0.95">${reps.slice(-1)[0].comment.slice(0,150)}${reps.slice(-1)[0].comment.length>150?'...':''}</div></div>`:''}
    </div>`;
  });
  body+=`<div style="text-align:center;padding:20px;font-size:11px;color:#94a3b8">🏫 ${sn} · ${monthLabel} 월간 학습 리포트</div></body></html>`;
  return body;
}

function downloadMonthlyReport(){
  const sel=document.getElementById('monthly-sel');
  const ym=sel?.value;
  if(!ym){alert('월을 선택해주세요');return;}
  const html=buildMonthlyReport(ym);
  if(!html){alert('해당 월의 데이터가 없습니다');return;}
  const blob=new Blob(['\uFEFF'+html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`[월간리포트]_${ym.replace('.','년')}월_${schoolName||'루멘수학'}.html`;
  a.click();URL.revokeObjectURL(url);
}

function getAvailableMonths(){
  const months=new Set();
  list.forEach(r=>{
    const d=r.date||'';
    const m=d.match(/^(\d{4}\.\d{2})/);
    if(m)months.add(m[1]);
  });
  return [...months].sort().reverse();
}
